<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TerraGrow Business Game</title>
  <link rel="icon" type="image/png" href="Webclip TerraGrowNew (1).png">
  <link rel="apple-touch-icon" href="Webclip TerraGrowNew (1).png">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=6">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <button class="hamburger" id="hamburger-btn" onclick="toggleSidebar()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
  </button>

  <div id="app-container">
    <nav id="sidebar">
      <div class="sidebar-header">
        <img src="Webclip TerraGrowNew (1).png" alt="TerraGrow" style="width:28px;height:28px;border-radius:8px;">
        <div>
          <div class="sidebar-logo">TerraGrow Business Game</div>
        </div>
      </div>

      <div class="sidebar-section">
        <label>Équipe</label>
        <div id="sidebar-team-display" style="padding:4px 0;"></div>
        <input type="hidden" id="nom-etudiant" />
      </div>

      <div class="sidebar-section" id="sidebar-exploitation">
        <label>Exploitation</label>
        <div class="sidebar-exploitation" id="sidebar-expl-nom">Aucune sélectionnée</div>
        <div class="sidebar-exploitation-detail" id="sidebar-expl-detail"></div>
      </div>

      <div class="sidebar-section">
        <label>Exercice</label>
        <div class="year-selector">
          <button class="year-btn" data-annee="N-2" onclick="setAnnee('N-2')">N-2</button>
          <button class="year-btn" data-annee="N-1" onclick="setAnnee('N-1')">N-1</button>
          <button class="year-btn active" data-annee="N" onclick="setAnnee('N')">N</button>
        </div>
      </div>

      <div class="sidebar-nav" id="sidebar-nav">
        <a href="#accueil" class="active">
          <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
          Accueil
        </a>
        <a href="#conseil-dashboard">
          <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 14l2 2 4-4"/></svg></span>
          Suivi Conseil
        </a>
        <a href="#scenarios">
          <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span>
          Scénarios
        </a>
        <a href="#decouverte">
          <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
          1. Découverte
        </a>
        <a href="#dashboard">
          <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>
          2. Comptabilité
        </a>
        <a href="#grand-livre">
          <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg></span>
          Grand livre / SIG
        </a>
        <a href="#couts-production">
          <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>
          3. Coûts de prod.
        </a>
        <a href="#tresorerie">
          <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></span>
          4. Trésorerie
        </a>
        <a href="#simulateur">
          <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span>
          5. Simulateur
        </a>
        <a href="#conseil">
          <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></span>
          6. Conseil
        </a>
        <a href="#comparaison">
          <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
          Comparaison
        </a>
        <a href="#rapport">
          <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>
          Rapport PDF
        </a>
        <a href="#fiches-session1">
          <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg></span>
          Fiches Session 1
        </a>
      </div>

      <div class="sidebar-badges" id="sidebar-badges"></div>

      <div class="sidebar-footer">
        <button class="btn-reset" onclick="resetApp()">Réinitialiser la session</button>
      </div>
    </nav>

    <main id="main-content">
      <div id="session-banner"></div>
      <div id="view-container">
        <div class="loading"><div class="spinner"></div> Chargement...</div>
      </div>
    </main>
  </div>

  <script type="module" src="js/app.js?v=6"></script>
</body>
</html>
